<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AfriShop — Boutique en Ligne | Guinée</title>
  <style>
    :root {
      --green: #1B6B3A; --green-dk: #134d29; --green-lt: #27963b;
      --gold: #F5A623; --gold-lt: #ffbe5c; --orange: #FF6B35;
      --white: #FFFFFF; --off-white: #F8F5F0; --text: #1a1a1a;
      --text-muted:#5a5a5a; --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,.12);
    }
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--off-white); color: var(--text); }
    nav { background: var(--green); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top:0; z-index:100; }
    .nav-logo { font-size: 1.5rem; font-weight: 800; }
    .nav-logo em { color: var(--gold); font-style: normal; }
    .hero { background: var(--green-dk); color: white; text-align: center; padding: 60px 5%; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 40px 5%; }
    .prod-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; position: relative; }
    .prod-card:hover { transform: translateY(-5px); }
    .prod-badge { position: absolute; top: 10px; left: 10px; background: var(--orange); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
    .prod-img { height: 200px; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .prod-img img { width: 100%; height: 100%; object-fit: cover; }
    .prod-info { padding: 15px; }
    .prod-badge-cod { background: var(--gold); color: var(--green-dk); font-size: 0.7rem; font-weight: 800; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
    .prod-price { color: var(--green); font-size: 1.2rem; font-weight: 900; }
    .btn-add { width: 100%; background: var(--green); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .btn-add:hover { background: var(--green-lt); }
    footer { background: var(--green-dk); color: white; text-align: center; padding: 40px 5%; }
  </style>
</head>
<body>
  <nav><div class="nav-logo">Afri<em>Shop</em> Guinea</div></nav>
  <section class="hero">
    <h1>Achetez Global, Vivez Local</h1>
    <p>Produits importés livrés à Conakry. Paiement à la livraison (COD) disponible!</p>
  </section>
  <div class="products-grid" id="productsGrid"></div>
  <footer><p>&copy; 2026 AfriShop Guinea. Tous droits réservés.</p></footer>
  <script>
    const products = [
      { id:1, name:'Tecno Spark 20', price:850000, img:'https://www.tecno-mobile.com/fileadmin/user_upload/Tecno_Spark_20_Main.png', badge:'Promo' },
      { id:2, name:'Xiaomi Redmi Note 13', price:1200000, img:'https://i01.appmifile.com/v1/MI_18455B3E4DA706226CF7535A58E875F0267/pms_1704355554.43731557.png', badge:'New' },
      { id:5, name:'Ventilateur Solaire 16 Pouces', price:695000, img:'https://m.media-amazon.com/images/I/71+G8vV8YfL._AC_SL1500_.jpg', badge:'Populaire' },
      { id:6, name:'Power Bank 10,000mAh', price:145000, img:'https://m.media-amazon.com/images/I/61l5-fUv6pL._AC_SL1500_.jpg', badge:'New' },
      { id:7, name:'Blender Multi-fonctions 600W', price:195000, img:'https://m.media-amazon.com/images/I/61K-K+7-pXL._AC_SL1500_.jpg', badge:'Promo' }
    ];
    function render() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = products.map(p => `
        <div class="prod-card">
          \${p.badge ? \`<div class="prod-badge">\${p.badge}</div>\` : ''}
          <div class="prod-img"><img src="\${p.img}" alt="\${p.name}"></div>
          <div class="prod-info">
            <div class="prod-badge-cod">🚚 PAYEZ À LA LIVRAISON (COD)</div>
            <h4>\${p.name}</h4>
            <div class="prod-price">\${p.price.toLocaleString('fr-GN')} GNF</div>
            <button class="btn-add" onclick="order('\${p.name}', \${p.price})">💬 Commander sur WhatsApp</button>
          </div>
        </div>
      \`).join('');
    }
    function order(name, price) {
      const msg = encodeURIComponent(\`Bonjour AfriShop! Je souhaite commander: \${name} (Prix: \${price.toLocaleString('fr-GN')} GNF). Merci de me confirmer la livraison à Conakry.\`);
      window.location.href = \`https://wa.me/8618867954290?text=\${msg}\`;
    }
    render();
  </script>
</body>
</html>
