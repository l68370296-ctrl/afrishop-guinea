<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afrishop Guinea - Votre Boutique Mobile</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .product-card { background: white; border-radius: 8px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: auto; display: block; }
        .product-info { padding: 15px; }
        .product-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .product-price { color: #e67e22; font-size: 1.1rem; font-weight: bold; }
        .buy-btn { display: block; width: 100%; padding: 12px; background-color: #27ae60; color: white; text-align: center; text-decoration: none; border-radius: 5px; margin-top: 10px; font-weight: bold; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>
    <header>
        <h1>Afrishop Guinea</h1>
    </header>
    <div class="container">
        <!-- Product 1 -->
        <div class="product-card">
            <img src="https://s.alicdn.com/@sc04/kf/H7b0a8f8d2b8b4b7b9b7b9b7b9b7b9b7bW.jpg" alt="Tecno Spark 20">
            <div class="product-info">
                <div class="product-title">Tecno Spark 20</div>
                <div class="product-price">Prix: Contactez-nous</div>
                <a href="#" class="buy-btn">Acheter Maintenant</a>
            </div>
        </div>
        <!-- Product 2 -->
        <div class="product-card">
            <img src="https://s.alicdn.com/@sc04/kf/Hfe1f273c7973476a87edeb148adafc34Q.jpg" alt="Ventilateur Solaire">
            <div class="product-info">
                <div class="product-title">Ventilateur Solaire</div>
                <div class="product-price">Prix: Contactez-nous</div>
                <a href="#" class="buy-btn">Acheter Maintenant</a>
            </div>
        </div>
        <!-- Product 3 -->
        <div class="product-card">
            <img src="https://s.alicdn.com/@sc04/kf/Hc04bc9e4216841f0a6f3a6812e4b0bf8U.jpg" alt="Power Bank">
            <div class="product-info">
                <div class="product-title">Power Bank</div>
                <div class="product-price">Prix: Contactez-nous</div>
                <a href="#" class="buy-btn">Acheter Maintenant</a>
            </div>
        </div>
    </div>
    <footer>
        &copy; 2026 Afrishop Guinea. Tous droits réservés.
    </footer>
</body>
</html>
